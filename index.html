<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tutor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold mb-4 text-center">AI Video Learning Path</h1>
        <div class="space-y-4">
            <input id="topic" type="text" placeholder="Enter Topic (e.g. Photosynthesis)" class="w-full p-2 border rounded">
            <select id="language" class="w-full p-2 border rounded">
                <option value="English">English</option>
                <option value="Hindi">Hindi</option>
            </select>
            <button onclick="createVideo()" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Generate</button>
        </div>
        <div id="status" class="mt-4 text-center hidden font-bold text-blue-600 italic">Processing...</div>
        <div id="video-area" class="mt-6"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
