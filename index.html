<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Learning Path</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 2s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <div class="max-w-4xl mx-auto py-12 px-4">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-slate-800 mb-2">AI Video Tutor</h1>
            <p class="text-slate-600">Personalized visual learning powered by OpenRouter & Pollinations AI</p>
        </div>

        <!-- Input Section -->
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-100">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Language</label>
                    <select id="language" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 transition-all outline-none">
                        <option value="English">English</option>
                        <option value="Hindi">Hindi</option>
                        <option value="Spanish">Spanish</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Subject</label>
                    <input id="subject" type="text" placeholder="e.g. Science" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Topic</label>
                    <input id="topic" type="text" placeholder="e.g. Black Holes" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <button onclick="createVideo()" id="generateBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg shadow-lg transform active:scale-95 transition-all flex justify-center items-center gap-2">
                <span>Generate Video Learning Path</span>
            </button>
        </div>

        <!-- Status & Loading -->
        <div id="status" class="mt-6 text-center text-slate-600 hidden">
            <div class="flex justify-center mb-2"><div class="loading-spinner"></div></div>
            <p>Waking up the server and generating your content... (This can take 30-60 seconds on free tier)</p>
        </div>

        <!-- Output Video/Image Area -->
        <div id="video-area" class="mt-10 space-y-8">
            <!-- Scenes will be injected here by app.js -->
        </div>
    </div>

    <!-- Link to external JS -->
    <script src="app.js"></script>
</body>
</html>
